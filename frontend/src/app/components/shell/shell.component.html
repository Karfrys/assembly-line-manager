<mat-sidenav-container class="shell-container">
  <mat-sidenav mode="side" opened class="sidenav">
    <div class="sidenav-header">
      <mat-icon class="brand-icon">precision_manufacturing</mat-icon>
      <span class="brand-text">ALM</span>
    </div>

    <mat-divider></mat-divider>

    <mat-nav-list>
      @for (item of navItems; track item.path) {
        <a mat-list-item [routerLink]="item.path" routerLinkActive="active-link">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <mat-toolbar class="toolbar">
      <span class="toolbar-spacer"></span>
      <button mat-button [matMenuTriggerFor]="userMenu" class="user-btn">
        <mat-icon>account_circle</mat-icon>
        <span class="user-name">{{ (authService.currentUser$ | async)?.name || 'User' }}</span>
        <mat-icon>arrow_drop_down</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu">
        <button mat-menu-item disabled>
          <mat-icon>email</mat-icon>
          <span>{{ (authService.currentUser$ | async)?.email }}</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Sign Out</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <div class="content-wrapper">
      <div class="router-container">
        <router-outlet />
      </div>
      <footer class="app-footer">
        <mat-icon class="footer-icon">precision_manufacturing</mat-icon>
        <span>Assembly Line Manager &copy; 2026 &bull; Created by <span class="creator-name">Karol Fryś</span></span>
      </footer>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
