<div class="page animate-fade-in-up">
  <div class="page-header">
    <div>
      <h1>Products</h1>
      <p class="muted-text">Manage switchgear product models</p>
    </div>
    <button mat-raised-button color="primary" (click)="openCreate()">
      <mat-icon>add</mat-icon>
      Add Product
    </button>
  </div>

  <mat-card class="table-card">
    <div class="table-toolbar">
      <mat-form-field appearance="fill" class="search-field">
        <mat-icon matPrefix>search</mat-icon>
        <mat-label>Search products...</mat-label>
        <input matInput [(ngModel)]="searchQuery" (ngModelChange)="applyFilter()">
      </mat-form-field>
    </div>

    @if (filteredProducts.length > 0) {
      <table mat-table [dataSource]="filteredProducts" class="data-table">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let row">
            <span class="product-name">{{ row.name }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="assemblyLines">
          <th mat-header-cell *matHeaderCellDef>Assembly Lines</th>
          <td mat-cell *matCellDef="let row">
            <span class="count-badge">{{ row.assemblyLines?.length || 0 }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="actions-col">Actions</th>
          <td mat-cell *matCellDef="let row" class="actions-col">
            <button mat-icon-button matTooltip="Edit" (click)="openEdit(row)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button matTooltip="Delete" (click)="delete(row)" class="delete-btn">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    } @else {
      <div class="empty-state">
        <mat-icon>inventory_2</mat-icon>
        <p>No products found</p>
        <button mat-stroked-button color="primary" (click)="openCreate()">Add your first product</button>
      </div>
    }
  </mat-card>
</div>
